name: "Bosun: Attach PR Marker"

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  attach:
    name: Attach Bosun marker
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Bosun PR labels exist (best effort)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const labels = [
              {
                name: "bosun-attached",
                color: "7c3aed",
                description: "Bosun low-trust PR attachment marker",
              },
              {
                name: "bosun-pr-bosun-created",
                color: "2563eb",
                description: "PR created by Bosun and eligible for Bosun automation",
              },
              {
                name: "bosun-pr-trusted-author",
                color: "0891b2",
                description: "PR authored by a trusted human login in Bosun policy",
              },
              {
                name: "bosun-pr-public",
                color: "6b7280",
                description: "PR observed by Bosun but not trusted for high-risk automation",
              },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (err) {
                if (err?.status === 404) {
                  try {
                    await github.rest.issues.createLabel({ owner, repo, ...label });
                  } catch (createErr) {
                    core.warning(
                      "Unable to create label '" +
                        label.name +
                        "': " +
                        String(createErr?.message || createErr),
                    );
                  }
                } else {
                  core.warning(
                    "Unable to verify label '" +
                      label.name +
                      "': " +
                      String(err?.message || err),
                  );
                }
              }
            }

      - name: Apply idempotent marker comment and optional label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request || {};
            const issue_number = context.payload.pull_request.number;
            const attachedLabel = "bosun-attached";
            const bosunCreatedMarker = "<!-- bosun-created -->";
            const marker = "<!-- bosun-pr-classification -->";
            const legacyMarker = "<!-- bosun-attached -->";
            const classLabels = {
              bosun: "bosun-pr-bosun-created",
              trusted: "bosun-pr-trusted-author",
              public: "bosun-pr-public",
            };
            const trigger =
              String(context.eventName || "unknown") +
              " / " +
              String((context.payload && context.payload.action) || "unknown");
            const prBody = String(pr.body || "");
            const labelNames = (pr.labels || [])
              .map((entry) => (typeof entry === "string" ? entry : entry?.name))
              .filter(Boolean);
            const isBosunCreated = labelNames.includes(classLabels.bosun);

            const normalizeList = (value) => {
              if (Array.isArray(value)) {
                return value
                  .map((entry) => String(entry || "").trim().toLowerCase())
                  .filter(Boolean);
              }
              return String(value || "")
                .split(/[\n,]/)
                .map((entry) => entry.trim().toLowerCase())
                .filter(Boolean);
            };

            const parseBool = (value, fallback = false) => {
              if (value === undefined || value === null || value === "") return fallback;
              const raw = String(value).trim().toLowerCase();
              if (["1", "true", "yes", "on"].includes(raw)) return true;
              if (["0", "false", "no", "off"].includes(raw)) return false;
              return fallback;
            };

            const loadBosunConfig = async (ref) => {
              const candidates = ["bosun.config.json", ".bosun.json", "bosun.json"];
              for (const path of candidates) {
                try {
                  const response = await github.rest.repos.getContent({ owner, repo, path, ref });
                  const file = response?.data;
                  if (!file || Array.isArray(file) || !file.content) continue;
                  const raw = Buffer.from(file.content, file.encoding || "base64").toString("utf8");
                  return JSON.parse(raw);
                } catch (err) {
                  if (err?.status !== 404) {
                    core.warning(
                      `Unable to read ${path} for PR attach policy: ${String(err?.message || err)}`,
                    );
                  }
                }
              }
              return {};
            };

            const bosunConfig = await loadBosunConfig(pr.head?.sha || context.sha);
            const prAutomation =
              bosunConfig?.prAutomation && typeof bosunConfig.prAutomation === "object"
                ? bosunConfig.prAutomation
                : {};
            const attachModeRaw = String(prAutomation.attachMode || "all").trim().toLowerCase();
            const attachMode = ["all", "trusted-only", "disabled"].includes(attachModeRaw)
              ? attachModeRaw
              : "all";
            const trustedAuthors = new Set(normalizeList(prAutomation.trustedAuthors));
            const allowTrustedFixes = parseBool(prAutomation.allowTrustedFixes, false);
            const allowTrustedMerges = parseBool(prAutomation.allowTrustedMerges, false);
            const authorLogin = String(pr.user?.login || pr.user?.name || "").trim().toLowerCase();
            const isTrustedAuthor = trustedAuthors.has(authorLogin);
            const prClass = isBosunCreated
              ? "bosun"
              : isTrustedAuthor
                ? "trusted"
                : "public";
            const classLabel = classLabels[prClass];
            const shouldAttach = isBosunCreated || attachMode === "all" || (attachMode === "trusted-only" && isTrustedAuthor);
            const automationScope = isBosunCreated
              ? "Eligible for Bosun repair and merge automation (Bosun-created PR)."
              : isTrustedAuthor
                ? allowTrustedFixes || allowTrustedMerges
                  ? `Trusted-author PR. Repair automation=${allowTrustedFixes ? "enabled" : "disabled"}; merge automation=${allowTrustedMerges ? "enabled" : "disabled"}.`
                  : "Trusted-author PR. Bosun observes it, but high-risk automation is still disabled by policy."
                : "Public PR. Bosun observes it only and will not auto-repair or auto-merge it.";
            const attachReason = shouldAttach
              ? isBosunCreated
                ? "yes, because Bosun-created PRs remain attached regardless of human PR attach mode"
                : attachMode === "all"
                  ? "yes, because attachMode=all"
                  : "yes, because attachMode=trusted-only and the author is trusted"
              : attachMode === "disabled"
                ? "no, because attachMode=disabled for human-authored PRs"
                : "no, because attachMode=trusted-only and the author is not trusted";
            const body = [
              marker,
              shouldAttach ? legacyMarker : "",
              `Bosun PR classification: ${prClass === "bosun" ? "Bosun-created" : prClass === "trusted" ? "trusted-author" : "public"}.`,
              "",
              shouldAttach
                ? "This PR is tracked by Bosun attachment automation."
                : "This PR was classified by Bosun, but the low-trust attach marker was not applied under the current policy.",
              `- PR class label: ${classLabel}`,
              `- Attach label: ${attachedLabel} (${attachReason})`,
              `- Attach mode policy: ${attachMode}`,
              `- Trusted author: ${isTrustedAuthor ? "yes" : "no"}`,
              `- Bosun-created label present: ${isBosunCreated ? "yes" : "no"}`,
              `- Automation scope: ${automationScope}`,
              "- CI failure signal label: bosun-needs-fix",
              "- CI failure marker: <!-- bosun-ci-failure -->",
              "- Trigger: " + trigger,
            ].filter(Boolean).join("\n");

            const syncLabel = async (name, present) => {
              try {
                if (present) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [name] });
                } else {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
                }
              } catch (err) {
                if (!present && err?.status === 404) return;
                core.warning(
                  `${present ? "Unable to apply" : "Unable to remove"} label '${name}': ${String(err?.message || err)}`,
                );
              }
            };

            await syncLabel(classLabels.bosun, prClass === "bosun");
            await syncLabel(classLabels.trusted, prClass === "trusted");
            await syncLabel(classLabels.public, prClass === "public");
            await syncLabel(attachedLabel, shouldAttach);

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const existing = comments.find((c) =>
              typeof c.body === "string" && (c.body.includes(marker) || c.body.includes(legacyMarker)),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
