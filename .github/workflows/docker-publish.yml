# ── Bosun: Docker Hub Publish ──────────────────────────────────────────────────
# Builds and pushes the Bosun Docker image to Docker Hub.
#
# Triggers:
#   - Push to main         → tags: latest, sha-<short>
#   - Push a version tag   → tags: <version>, latest, sha-<short>
#   - Manual dispatch      → tags: latest, sha-<short> (+ optional custom tag)
#
# Required secrets:
#   DOCKERHUB_USERNAME — Docker Hub username
#   DOCKERHUB_TOKEN    — Docker Hub access token (not password)
# ──────────────────────────────────────────────────────────────────────────────

name: "Bosun: Docker Publish"

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "**"
      - "!tests/**"
      - "!docs/**"
      - "!_docs/**"
      - "!**/*.md"
      - "!.github/**"
  workflow_dispatch:
    inputs:
      custom_tag:
        description: "Optional additional Docker tag (e.g. beta, rc1)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: virtengine/bosun

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from package.json
        id: pkg
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Package version: $VERSION"

      - name: Docker meta — compute tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On main push: latest + sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            # On version tag (v*): semver tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Package.json version (always)
            type=raw,value=${{ steps.pkg.outputs.version }},enable={{is_default_branch}}
            # Manual custom tag
            type=raw,value=${{ inputs.custom_tag }},enable=${{ inputs.custom_tag != '' }}
          labels: |
            org.opencontainers.image.title=Bosun
            org.opencontainers.image.description=AI-powered DevOps orchestrator — agents, tasks, workflows, portal
            org.opencontainers.image.vendor=VirtEngine
            org.opencontainers.image.version=${{ steps.pkg.outputs.version }}

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Print published tags
        run: |
          echo "✅ Published image tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/  • /'

      - name: Verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} node -e "console.log('Bosun v' + require('./package.json').version + ' — image OK')"
