# Deploy Bosun landing page to GitHub Pages
#
# Runs in the virtengine/bosun repo (or triggered via submodule push).
# No cross-repo token needed — uses the built-in GITHUB_TOKEN.
#
# GitHub Pages settings for virtengine/bosun:
#   Settings → Pages → Source: Deploy from branch (gh-pages / root)
#
# The CNAME file in site/ keeps bosun.engineer wired up.
# NOTE: site/ui is a symlink to ../ui — resolved at deploy time.
#
# WARNING: Do NOT add a second workflow using actions/deploy-pages@v4.
# That action requires build_type="workflow" but this repo uses legacy
# branch-based deployment. The two are mutually exclusive and the API
# deploy will hang on "purging_cdn" indefinitely.

name: "Bosun: Deploy Site"

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "ui/**"
      - "_docs/**"
      - "docs/**"
      - "package.json"
      - "tools/build-docs.mjs"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Inject version into docs
        run: node tools/build-docs.mjs

      # GitHub Pages does not follow symlinks.
      # site/ui → ../ui is a symlink that works locally but breaks on GH Pages.
      # Replace it with a real copy of the ui/ directory.
      - name: Resolve symlinks in site/
        run: |
          if [ -L site/ui ]; then
            rm site/ui
            cp -rL ui site/ui
            echo "Resolved site/ui symlink → copied ui/ into site/ui/"
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          cname: bosun.engineer
          commit_message: "chore(site): deploy ${{ github.sha }}"
          force_orphan: false
